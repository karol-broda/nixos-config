name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  check:
    name: Evaluate & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@4eae8bea4afaa8f8ea8aa638ab9a7fead2f3d21e # v31
        with:
          extra_nix_config: |
            extra-substituters = https://cache.karolbroda.com/nixos https://nix-community.cachix.org https://hyprland.cachix.org https://cache.numtide.com
            extra-trusted-public-keys = nixos:fRVFLw3mNj5aX9OJaqFsRCrPGD26QazTeUnetsBpUQI= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= hyprland.cachix.org-1:a7pgxzMz7+chwVL3/pzj6jIBMioiJM7ypFP8PwtkuGc= niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g=

      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-check-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-check-

      - name: Lint (deadnix, formatter, statix)
        run: |
          nix build \
            .#checks.x86_64-linux.deadnix \
            .#checks.x86_64-linux.nix-fmt \
            .#checks.x86_64-linux.statix \
            --print-build-logs

      - name: Evaluate NixOS configuration
        run: nix eval .#nixosConfigurations.nixos.config.system.build.toplevel --raw

      - name: Build plan (dry run)
        if: github.event_name == 'pull_request'
        id: dry-run
        run: |
          nix build .#nixosConfigurations.nixos.config.system.build.toplevel \
            --dry-run 2>&1 | tee build-plan.txt || true

      - name: Post build plan as PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -s build-plan.txt ]; then
            echo "nothing to build (all derivations cached)." > build-plan.txt
          fi
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "$(printf '### build plan\n```\n'; cat build-plan.txt; printf '\n```')" \
            --edit-last 2>/dev/null || \
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "$(printf '### build plan\n```\n'; cat build-plan.txt; printf '\n```')"

  cache:
    name: Build & push to cache
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup
          df -h

      - uses: cachix/install-nix-action@4eae8bea4afaa8f8ea8aa638ab9a7fead2f3d21e # v31
        with:
          extra_nix_config: |
            extra-substituters = https://cache.karolbroda.com/nixos https://nix-community.cachix.org https://hyprland.cachix.org https://cache.numtide.com
            extra-trusted-public-keys = nixos:fRVFLw3mNj5aX9OJaqFsRCrPGD26QazTeUnetsBpUQI= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= hyprland.cachix.org-1:a7pgxzMz7+chwVL3/pzj6jIBMioiJM7ypFP8PwtkuGc= niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g=

      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-build-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-build-
          gc-max-store-size-linux: 8000000000 # 8 GB

      - name: Build NixOS system closure
        run: |
          nix build .#nixosConfigurations.nixos.config.system.build.toplevel \
            --print-build-logs \
            --keep-going

      - name: Push to attic
        if: always()
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          nix run nixpkgs#attic-client -- \
            login default https://cache.karolbroda.com "$ATTIC_TOKEN"
          if [ -L result ]; then
            nix run nixpkgs#attic-client -- push nixos result -j 4
          fi

  open-issue-on-failure:
    name: Open issue on master failure
    runs-on: ubuntu-latest
    needs: [check, cache]
    if: always() && failure() && github.ref == 'refs/heads/master'
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Create labels if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "broken-build" --color "d73a4a" --description "build or eval is broken" 2>/dev/null || true

      - name: Open issue if none already open
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          existing=$(gh issue list --label "broken-build" --state open --json number --jq '.[0].number')
          if [ -z "$existing" ]; then
            gh issue create \
              --title "ci: check failed on master ($(date '+%Y-%m-%d'))" \
              --body "the CI check failed on the master branch.

          **workflow run:** $RUN_URL
          **commit:** $COMMIT_SHA" \
              --label "broken-build"
          fi
