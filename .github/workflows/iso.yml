name: Build ISO

on:
  schedule:
    - cron: "0 10 1 * *" # first of every month, 10:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & release ISO
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /usr/local/.ghcup
          df -h

      - uses: cachix/install-nix-action@4eae8bea4afaa8f8ea8aa638ab9a7fead2f3d21e # v31
        with:
          extra_nix_config: |
            extra-substituters = https://cache.karolbroda.com/nixos https://nix-community.cachix.org https://hyprland.cachix.org https://cache.numtide.com
            extra-trusted-public-keys = nixos:fRVFLw3mNj5aX9OJaqFsRCrPGD26QazTeUnetsBpUQI= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCYg3Fs= hyprland.cachix.org-1:a7pgxzMz7+chwVL3/pzj6jIBMioiJM7ypFP8PwtkuGc= niks3.numtide.com-1:DTx8wZduET09hRmMtKdQDxNNthLQETkc/yaX7M4qK0g=

      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7
        with:
          primary-key: nix-${{ runner.os }}-iso-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-iso-
          gc-max-store-size-linux: 8000000000 # 8 GB

      - name: Build ISO
        run: |
          nix build .#nixosConfigurations.nixos.config.system.build.isoImage \
            --print-build-logs

          ISO_PATH=$(ls result/iso/*.iso)
          echo "ISO_PATH=$ISO_PATH" >> "$GITHUB_ENV"

      - name: Get ISO size
        run: du -sh "$ISO_PATH"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="iso-$(date '+%Y-%m-%d')"

          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          gh release create "$TAG" "$ISO_PATH" \
            --title "iso $(date '+%Y-%m-%d')" \
            --notes "built from commit ${{ github.sha }}" \
            --latest=false
